name: Generate snake animation

# Renders pikammmmm's contribution graph as an animated snake that
# "eats" the green squares. Output SVGs / GIFs are pushed to the
# `output` branch so README.md can hot-link them from raw.githubusercontent.com.

on:
  schedule:
    # Once a day at 04:11 UTC — off-the-hour so we don't race GitHub's
    # cron hotspots, and a different slot from spread-dates (03:17) so
    # by the time the snake renders the contribution graph has the
    # freshly-spread dates from badge-playground.
    - cron: "11 4 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: snake
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Render contribution snake
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # Multi-variant output: light SVG (auto-displays on light
          # GitHub themes), dark SVG (dark themes), and a colourful GIF
          # variant so the README has a fallback if the SVG fails.
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
            dist/snake.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
